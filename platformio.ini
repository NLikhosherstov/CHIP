; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = arduino

lib_deps = 
    bodmer/TFT_eSPI
    adafruit/Adafruit BusIO
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor
    gyverlibs/EncButton

; Настройки загрузчика
upload_protocol = custom
upload_command = "$PYTHONEXE" tools/uf2conv.py "${BUILD_DIR}\firmware.bin" "${BUILD_DIR}\firmware.uf2" E:\
board_build.flash_offset = 0x10000
board_upload.offset_address = 0x08010000
; 320 KB app flash: 0x08010000..0x0805FFFF; Sector 7 @ 0x08060000 reserved for config
board_upload.maximum_size = 327680

; Настройка монитора
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes

build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBD_USE_CDC
    -D USBCON
    -D HAL_PCD_MODULE_ENABLED

    ; Настройка шрифтов
    -D SMOOTH_FONT=1
    
    ; Настройки дисплея
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1        ; драйвер дисплея
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TOUCH_CS=-1            ; Тач отстутствует
    -D TFT_RGB_ORDER=TFT_BGR  ; Попробуем BGR (если цвета будут странные — сменим)
    -D TFT_INVERSION_ON       ; ST7789 часто требует инверсию цвета программно
    -D TFT_MOSI=PA7           ; SDA
    -D TFT_SCLK=PA5           ; SCL
    -D TFT_CS=PA3             ; CS
    -D TFT_DC=PA2             ; DC
    -D TFT_RST=PA1            ; RST
    ; -D TFT_BL=PB10            ; Подсветка
    ; -D TFT_BACKLIGHT_ON=HIGH  ; Включаем логической единицей
    -D LOAD_GLCD=1            ; Стандартный шрифт (GLCD 5x7)
    -D LOAD_FONT2=1           ; Мелкий встроенный
    -D LOAD_FONT4=1           ; Средний встроенный
    -D LOAD_GFXFF=1           ; Поддержка GFX шрифтов (Aldrich, Roboto Mono)
    -D SPI_FREQUENCY=27000000 ; Частота SPI

    ; FlashConfigStore: Sector 7 @ 0x08060000 (128 KB, вне linker FLASH)
    -D FLASH_CONFIG_BASE=0x08060000UL
    -D FLASH_CONFIG_SECTOR=FLASH_SECTOR_7